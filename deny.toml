[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
]
confidence-threshold = 0.95

[bans]
multiple-versions = "warn"
wildcards = "deny"
# No floats, no rand in the accounting path; deny crates that commonly smuggle them in.
deny = [
    { crate = "openssl", reason = "rustls-only policy for the presidio-hardened family" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
