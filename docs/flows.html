<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>presidio-hardened-treasury — main flows</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel-2:#1c222c; --border:#2a313c;
    --text:#e6edf3; --muted:#8b949e; --accent:#7ee787; --accent-2:#79c0ff;
    --warn:#f0883e; --crit:#f85149; --code:#0a0d12;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif}
  a{color:var(--accent-2);text-decoration:none}
  a:hover{text-decoration:underline}
  header{padding:28px 40px 14px;border-bottom:1px solid var(--border)}
  header h1{margin:0 0 4px;font-size:22px;font-weight:600}
  header .meta{color:var(--muted);font-size:13px}
  main{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:calc(100vh - 80px)}
  nav{border-right:1px solid var(--border);padding:18px 18px 40px;position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto}
  nav h3{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:18px 0 6px}
  nav ul{list-style:none;padding:0;margin:0}
  nav li a{display:block;padding:5px 8px;border-radius:4px;color:var(--text)}
  nav li a:hover{background:var(--panel)}
  nav li a.active{background:var(--panel-2);color:var(--accent)}
  section.flow,section.intro{padding:28px 40px;max-width:1120px;border-bottom:1px solid var(--border)}
  section.flow h2,.intro h2{margin:0 0 4px;font-size:18px;font-weight:600;color:var(--accent)}
  .summary{color:var(--muted);margin-bottom:14px}
  .entry{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12px;color:var(--accent-2);background:var(--code);padding:6px 10px;border-radius:4px;display:inline-block;margin-bottom:14px}
  pre.diagram{background:var(--code);color:var(--text);border:1px solid var(--border);padding:14px 16px;border-radius:6px;overflow-x:auto;font:12px/1.5 "SF Mono",Menlo,Consolas,monospace;margin:10px 0 18px}
  ol.steps{list-style:none;counter-reset:step;padding:0;margin:0}
  ol.steps li{position:relative;padding:10px 12px 10px 44px;border-left:2px solid var(--border);margin-left:14px;counter-increment:step}
  ol.steps li::before{content:counter(step);position:absolute;left:-15px;top:10px;width:28px;height:28px;border-radius:50%;background:var(--panel-2);border:1px solid var(--border);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}
  ol.steps li .label{font-weight:600}
  ol.steps li .where{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;color:var(--accent-2);margin-left:8px}
  ol.steps li .detail{display:block;color:var(--muted);margin-top:2px}
  ul.bullets{margin:8px 0 0;padding:0;list-style:none}
  ul.bullets li{padding:4px 0 4px 18px;position:relative;color:var(--muted)}
  ul.bullets li::before{content:"›";position:absolute;left:0;color:var(--accent)}
  ul.errors li::before{content:"✕";color:var(--crit)}
  table.components,table.guards{border-collapse:collapse;width:100%;margin-top:10px;font-size:13px}
  table.components th,table.components td,table.guards th,table.guards td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
  table.components th,table.guards th{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  table.components code,table.guards code{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12px;color:var(--accent-2)}
  table.components td,table.guards td{overflow-wrap:anywhere}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:var(--panel-2);color:var(--muted);margin-right:6px}
  .modes,.items{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-top:8px}
  .mode-card,.item-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
  .mode-card .name,.item-card .name{font-weight:600;color:var(--accent)}
  .item-card .meta{font-size:11px;color:var(--muted);margin-top:2px}
  #error{display:none;margin:20px 40px;padding:12px 16px;background:#3b1d1d;border:1px solid var(--crit);border-radius:6px;color:#ffd7d7}
  @media (max-width:760px){
    header{padding:20px 18px 12px}
    main{display:block;min-height:auto}
    nav{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--border);padding:12px 18px}
    nav ul{display:flex;flex-wrap:wrap;gap:4px}
    nav li a{padding:4px 7px}
    section.flow,section.intro{padding:22px 18px;max-width:none}
    .entry{max-width:100%;white-space:normal;word-break:break-word}
    .modes,.items{grid-template-columns:1fr}
    table.components,table.guards{font-size:12px}
    table.components th,table.components td,table.guards th,table.guards td{padding:7px}
  }
</style>
</head>

      "notes": [
        "Fixture tests need no live service and can run with Docker networking disabled.",
        "Future live blockchain integration jobs should use regtest or public testnet fixtures until a production partner explicitly provides real holdings and audit scope.",
        "The pure close remains deterministic even when concrete I/O shims change."
      ]
    },
    {
      "id": "close-blockers",
      "name": "Fail-Closed Close Blockers",
      "summary": "The negative close tests document what the system refuses to guess about. In every case the safer behavior is to block close or reject construction.",
      "entry": "crates/treasury-e2e/tests/negative_close.rs",
      "guards": [
        { "id": "B1", "condition": "Independent chain histories diverge", "blocks": "No L1 observation is booked; completeness gate blocks close.", "evidence": "treasury-chainsource + treasury-conformance" },
        { "id": "B2", "condition": "Source changes settled history on re-query", "blocks": "Reproducibility gate rejects the source before booking.", "evidence": "reproducibility_gate" },
        { "id": "B3", "condition": "Asset is unassessed, undetermined, or out of ASU 2023-08 scope", "blocks": "Valuation does not run for that asset.", "evidence": "treasury-scope" },
        { "id": "B4", "condition": "Price snapshot lacks a held asset", "blocks": "Fair-value report is not emitted.", "evidence": "treasury-fairvalue" },
        { "id": "B5", "condition": "Journal entry would not balance", "blocks": "Entry cannot be constructed.", "evidence": "treasury-gaap" },
        { "id": "B6", "condition": "GL read-back differs from posted batch", "blocks": "Posting remains unverified and names the mismatch.", "evidence": "treasury-posting + treasury-gl" },
        { "id": "B7", "condition": "Anchor submits but does not confirm in budget", "blocks": "Overdue state is visible; coverage gap is not silent.", "evidence": "treasury-anchor" }
      ]
    }
  ]
}</script>
<script>
(async function(){
  const errEl = document.getElementById('error');
  function showError(msg){ errEl.style.display='block'; errEl.textContent = msg; }

  let data;
  try {
    const res = await fetch('flows.json', {cache:'no-store'});
    if (!res.ok) throw new Error('http '+res.status);
    data = await res.json();
  } catch (e) {
    try {
      data = JSON.parse(document.getElementById('flows-data').textContent);
    } catch (e2) {
      showError('Could not load flows.json, and the inline fallback JSON could not be parsed.');
      return;
    }
  }

  document.getElementById('proj-name').textContent = data.project.name + ' — main flows';
  document.getElementById('proj-meta').innerHTML =
    '<span class="pill">v' + data.project.version + '</span>' + escapeHtml(data.project.purpose);

  const navFlows = document.getElementById('nav-flows');
  data.flows.forEach(f => {
    const li = document.createElement('li');
    li.innerHTML = '<a href="#'+f.id+'">'+escapeHtml(f.name)+'</a>';
    navFlows.appendChild(li);
  });

  const root = document.getElementById('content');
  root.insertAdjacentHTML('beforeend',
    '<section class="intro" id="layout"><h2>Repository layout</h2>'+
    '<p class="summary">Where each flow lives in the tree.</p>'+
    '<table class="components"><tbody>'+
      Object.entries(data.project.layout).map(([k,v]) =>
        '<tr><td><code>'+escapeHtml(k)+'</code></td><td>'+escapeHtml(v)+'</td></tr>'
      ).join('') +
    '</tbody></table></section>'
  );

  root.insertAdjacentHTML('beforeend',
    '<section class="intro" id="components"><h2>Component map</h2>'+
    '<p class="summary">Crates referenced by the flows below.</p>'+
    '<table class="components"><thead><tr><th>ID</th><th>Module</th><th>Role</th></tr></thead><tbody>'+
      data.components.map(c =>
        '<tr><td><strong>'+escapeHtml(c.id)+'</strong></td>'+
        '<td><code>'+escapeHtml(c.module)+'</code></td>'+
        '<td>'+escapeHtml(c.role)+'</td></tr>'
      ).join('') +
    '</tbody></table></section>'
  );

  data.flows.forEach(f => {
    let html = '<section class="flow" id="'+f.id+'">';
    html += '<h2>'+escapeHtml(f.name)+'</h2>';
    if (f.summary) html += '<div class="summary">'+escapeHtml(f.summary)+'</div>';
    if (f.entry) html += '<div class="entry">'+escapeHtml(f.entry)+'</div>';

    if (f.diagram) {
      html += '<pre class="diagram">'+f.diagram.map(escapeHtml).join('\n')+'</pre>';
    }
    if (f.steps) {
      html += '<ol class="steps">';
      f.steps.forEach(s => {
        html += '<li><span class="label">'+escapeHtml(s.label)+'</span>'+
                (s.where ? '<span class="where">'+escapeHtml(s.where)+'</span>' : '')+
                (s.detail ? '<span class="detail">'+escapeHtml(s.detail)+'</span>' : '')+
                '</li>';
      });
      html += '</ol>';
    }
    if (f.errors) {
      html += '<h3 style="font-size:13px;margin:16px 0 4px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Failure states</h3>';
      html += '<ul class="bullets errors">'+f.errors.map(e =>
        '<li>'+escapeHtml(e)+'</li>'
      ).join('')+'</ul>';
    }
    if (f.events) {
      html += '<h3 style="font-size:13px;margin:16px 0 4px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Events</h3>';
      html += '<ul class="bullets">'+f.events.map(e =>
        '<li>'+escapeHtml(e)+'</li>'
      ).join('')+'</ul>';
    }
    if (f.modes) {
      html += '<div class="modes">'+f.modes.map(m =>
        '<div class="mode-card"><div class="name">'+escapeHtml(m.name)+'</div>'+
        '<div class="detail" style="color:var(--muted);font-size:13px;margin-top:4px">'+escapeHtml(m.detail)+'</div></div>'
      ).join('')+'</div>';
    }
    if (f.items) {
      html += '<div class="items">'+f.items.map(it =>
        '<div class="item-card"><div class="name">'+escapeHtml(it.name)+'</div>'+
        '<div class="meta"><code>'+escapeHtml(it.module)+'</code> · '+escapeHtml(it.framework||'')+'</div>'+
        '<div class="detail" style="color:var(--muted);font-size:13px;margin-top:4px">'+escapeHtml(it.wraps||'')+'</div></div>'
      ).join('')+'</div>';
    }
    if (f.guards) {
      html += '<table class="guards"><thead><tr><th>ID</th><th>Condition</th><th>Blocks</th><th>Evidence</th></tr></thead><tbody>'+
        f.guards.map(g =>
          '<tr><td>'+escapeHtml(g.id)+'</td>'+
          '<td>'+escapeHtml(g.condition)+'</td>'+
          '<td>'+escapeHtml(g.blocks)+'</td>'+
          '<td><code>'+escapeHtml(g.evidence)+'</code></td></tr>'
        ).join('') +
      '</tbody></table>';
    }
    if (f.notes) {
      html += '<h3 style="font-size:13px;margin:16px 0 4px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Notes</h3>';
      html += '<ul class="bullets">'+f.notes.map(n =>
        '<li>'+escapeHtml(n)+'</li>'
      ).join('')+'</ul>';
    }
    html += '</section>';
    root.insertAdjacentHTML('beforeend', html);
  });

  const links = Array.from(document.querySelectorAll('nav a'));
  const targets = links.map(a => document.querySelector(a.getAttribute('href'))).filter(Boolean);
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#'+en.target.id));
      }
    });
  }, {rootMargin:'-30% 0px -65% 0px'});
  targets.forEach(t => obs.observe(t));

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
